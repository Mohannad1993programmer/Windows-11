<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg">
        <div class="icons">
            <img src="Images/thispc.png" alt="">
            <p>This PC</p>
            <img src="Images/recyclebinicon.png" alt="">
            <p>Recycle Bin</p>
            <img src="Images/edgeicon.png" alt="">
            <p>Microsoft Edge</p>
        </div>
    </div>
    <div class="taskbar">
        <img id="start-icon" src="Images/win.PNG" alt="">
        <img id="search-icon" src="Images/searchIcon.PNG" alt="">
        <img src="Images/icons4.PNG" alt="">
        <img id="widgets-icon" src="Images/widgetsIcon.PNG" alt="">
        <img src="Images/edgeIcons.PNG" alt="">
        <img id="store-icon" src="Images/storeIcon.PNG" alt="">
        <img id="explorer-icon" src="Images/fileExplorerIcon.png" alt="">
        <img id="right-taskbar" src="Images/taskbarright.PNG" alt="">
        
    </div>
    <div id="start-menu">
        <img src="Images/startmenu.PNG" alt="">
    </div>
    <div id="search">
        <img src="Images/search.jpg" alt="">
    </div>
    <div id="widgets">
        <img src="Images/widgets.jpg" alt="">
    </div>
    <div id="explorer">
        <img src="Images/fileExplorer.png" alt="">
    </div>
    <div id="store">
        <img src="Images/store.jpg" alt="">
    </div>
    <script src="script.js"></script>
</body>
</html>
